<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | しんゆり会計</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- ============================= -->
<!-- Header（既存ヘッダーを使用） -->
<!-- ============================= -->
<header class="header">
  <!-- 既存ヘッダー -->
</header>


<main>

<!-- ============================= -->
<!-- Contact -->
<!-- ============================= -->
<section class="contact">

  <div class="contact__inner">

    <h1 class="contact__title">
      Contact Us
    </h1>

    <p class="contact__lead">
      お問い合わせは下記フォームよりご連絡ください。<br>
      必要事項ご記入のうえ、[送信]をクリックしてください。
    </p>


    <!-- フォーム入れる箱 -->
    <div class="contact__form">

      <!-- 後でフォームサービス or PHP -->
      <form action="#" method="post">

        <div class="form-item">
          <label>氏名</label>
          <input type="text" name="name">
        </div>

        <div class="form-item">
          <label>メールアドレス</label>
          <input type="email" name="email">
        </div>

        <div class="form-item">
          <label>法人に関するご相談</label>
          <input type="text" name="corporate">
        </div>

        <div class="form-item">
          <label>ご相談内容（税務顧問 / 記帳 / 設立など）</label>
          <input type="text" name="category">
        </div>

        <div class="form-item">
          <label>メッセージ本文（任意）</label>
          <textarea name="message"></textarea>
        </div>

        <div class="form-submit">
          <button type="submit">送信</button>
        </div>

      </form>

    </div>

  </div>

</section>

</main>


<!-- ============================= -->
<!-- Footer（既存フッター） -->
<!-- ============================= -->
<footer class="footer">
  <!-- 既存フッター -->
</footer>

</body>
</html>

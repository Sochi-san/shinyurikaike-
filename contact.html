<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | しんゆり会計</title>
  <meta name="description" content="しんゆり会計へのお問い合わせページです。ご相談内容にあわせてお気軽にご連絡ください。">
  <link
    href="https://fonts.googleapis.com/css2?family=Petit+Formal+Script&family=Playfair+Display:ital,wght@1,500&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header class="site-header site-header--visible" role="banner">
    <div class="site-header__inner">
      <a class="site-header__logo" href="shinyuri-accg.html">しんゆり会計｜岡野直純税理士事務所</a>

      <button class="site-header__burger" id="burgerBtn" aria-label="メニューを開く/閉じる" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <nav class="site-header__nav" id="globalNav" aria-label="グローバルナビゲーション">
        <ul class="site-header__nav-list">
          <li><a href="shinyuri-accg.html#note" class="site-header__nav-link">Note</a></li>
          <li><a href="shinyuri-accg.html#services" class="site-header__nav-link">Services</a></li>
          <li><a href="shinyuri-accg.html#about" class="site-header__nav-link">About</a></li>
          <li><a href="contact.html" class="site-header__nav-link" aria-current="page">Contact</a></li>
        </ul>
      </nav>
    </div>

    <div class="site-header__overlay" id="navOverlay"></div>
  </header>

  <main class="contact-page-main">
    <section class="contact-page-header" aria-labelledby="contact-page-title">
      <div class="contact-page-header__inner">
        <h1 id="contact-page-title" class="contact-page-header__title heading-en">Contact Us</h1>
        <p class="contact-page-header__intro text-body">お問い合わせは下記フォームよりご連絡ください。</p>
      </div>
    </section>

    <section class="contact-form-section" aria-labelledby="contact-form-title">
      <div class="contact-form-section__inner">
        <h2 id="contact-form-title" class="visually-hidden">お問い合わせフォーム</h2>

        <p class="contact-form-section__lead text-body">必要事項ご記入のうえ、[送信]をクリックしてください。</p>

        <form class="contact-form" action="#" method="post" novalidate>
          <div class="contact-form__group">
            <label for="contact-name" class="contact-form__label">氏名<span class="form-required" aria-hidden="true">必須</span></label>
            <input id="contact-name" name="name" type="text" class="contact-form__field" autocomplete="name" required>
            <p class="contact-form__error" aria-live="polite"></p>
          </div>

          <div class="contact-form__group">
            <label for="contact-email" class="contact-form__label">メールアドレス<span class="form-required" aria-hidden="true">必須</span></label>
            <input id="contact-email" name="email" type="email" class="contact-form__field" autocomplete="email" required>
            <p class="contact-form__error" aria-live="polite"></p>
          </div>

          <div class="contact-form__group">
            <label for="contact-kind" class="contact-form__label">法人に関するご相談<span class="form-required" aria-hidden="true">必須</span></label>
            <select id="contact-kind" name="consultation-kind" class="contact-form__field" autocomplete="off" required>
              <option value="" selected>選択してください</option>
              <option value="corporate">法人に関するご相談</option>
              <option value="individual">個人に関するご相談</option>
              <option value="inheritance">相続に関するご相談</option>
              <option value="other">その他</option>
            </select>
            <p class="contact-form__error" aria-live="polite"></p>
          </div>

          <div class="contact-form__group">
            <label for="contact-service" class="contact-form__label">ご相談内容（税務顧問/記帳/設立など）<span class="form-required" aria-hidden="true">必須</span></label>
            <select id="contact-service" name="consultation-topic" class="contact-form__field" autocomplete="off" required>
              <option value="" selected>選択してください</option>
              <option value="advisor">税務顧問</option>
              <option value="bookkeeping">記帳</option>
              <option value="incorporation">設立</option>
              <option value="tax-return">確定申告</option>
              <option value="inheritance-tax">相続</option>
              <option value="other">その他</option>
            </select>
            <p class="contact-form__error" aria-live="polite"></p>
          </div>

          <div class="contact-form__group">
            <label for="contact-message" class="contact-form__label">メッセージ本文（任意）</label>
            <textarea id="contact-message" name="message" class="contact-form__field contact-form__field--textarea" autocomplete="off" rows="6"></textarea>
            <p class="contact-form__error" aria-live="polite"></p>
          </div>

          <div class="contact-form__actions">
            <button type="submit" class="button-primary contact-form__submit text-button">送信</button>
          </div>
        </form>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="site-footer__inner">
      <p class="site-footer__copy">© しんゆり会計 ｜ 岡野直純税理士事務所</p>
    </div>
  </footer>

  <script src="main.js"></script>
</body>
</html>
